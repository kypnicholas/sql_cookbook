name: Test SQL Queries

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: chinook
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set up database schema
        run: |
          psql -h localhost -U postgres -d chinook -f migrations/001_create_schema.sql
        env:
          PGPASSWORD: postgres
      
      - name: Load seed data
        run: |
          psql -h localhost -U postgres -d chinook -f seeds/001_seed_data.sql
        env:
          PGPASSWORD: postgres
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: chinook
          PGUSER: postgres
          PGPASSWORD: postgres
      
      - name: Generate coverage report (optional)
        if: always()
        run: |
          pip install pytest-cov
          pytest tests/ --cov=tests --cov-report=term-missing
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: chinook
          PGUSER: postgres
          PGPASSWORD: postgres
